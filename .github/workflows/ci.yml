name: CI

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/ermel_test
      NODE_ENV: test
      SESSION_SECRET: ci-session-secret
      FRONTEND_URL: http://127.0.0.1:5173
      CORS_ORIGIN: http://127.0.0.1:5173

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ermel_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d ermel_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            Ermel Website/package-lock.json
            server/package-lock.json
            tests/package-lock.json

      - name: Install frontend dependencies
        working-directory: Ermel Website
        run: npm ci

      - name: Install backend dependencies
        working-directory: server
        run: npm ci

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Install Playwright browsers
        working-directory: tests
        run: npx playwright install --with-deps chromium

      - name: Type check frontend
        working-directory: Ermel Website
        run: npm run typecheck

      - name: Type check backend
        working-directory: server
        run: npm run typecheck

      - name: Build backend
        working-directory: server
        run: npm run build

      - name: Run backend migrations
        working-directory: server
        run: npm run migrate

      - name: Start backend server
        working-directory: server
        run: |
          npm run start > ../backend.log 2>&1 &

      - name: Wait for backend API
        run: |
          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:4000/api/health > /dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            if (( i % 10 == 0 )); then
              echo "Waiting for backend... attempt $i"
              tail -n 50 backend.log || true
            fi
            sleep 2
          done
          echo "Backend failed to start in time"
          echo "--- backend.log ---"
          cat backend.log || true
          exit 1

      - name: Run tests
        working-directory: tests
        run: npm test

      - name: Build frontend
        working-directory: Ermel Website
        run: npm run build
