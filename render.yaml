databases:
  - name: ermel-postgres
    databaseName: ermel
    user: ermel

services:
  - type: web
    name: ermel-backend
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: ermel-postgres
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: BASE_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_PASS
        sync: false

  - type: static
    name: ermel-frontend
    rootDir: Ermel Website
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
